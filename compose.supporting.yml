services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: labcart
      POSTGRES_USER: labcart
      POSTGRES_PASSWORD: labcart
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata_local:
