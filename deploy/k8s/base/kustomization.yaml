apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # ✅ Frontend
  - web-deployment.yaml
  - web-service.yaml

  # ✅ API
  - api-deployment.yaml
  - api-service.yaml

  # ✅ Database
  - postgres-statefulset.yaml
  - postgres-service.yaml

  # ✅ Cache / Queue
  - redis-deployment.yaml
  - redis-service.yaml

  # ✅ Ingress
  - api-ingress.yaml
  - web-ingress.yaml

  # ✅ Autoscaling
  - api-hpa.yaml

  # ✅ Secrets
  - db-secret.yaml
  - redis-secret.yaml
  - api-secret.yaml